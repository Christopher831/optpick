{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 data-i18n="form-title">Please input the following parameters</h2>
    <form action="{{ url_for('execute') }}" method="post" id="mainForm">
        <input type="hidden" name="lang" id="langField" value="en">
        <div class="params-grid">
            <div class="param">
                <label for="m">m</label>
                <input type="number" id="m" name="m" min="45" max="54" value="45" required>
                <span class="hint">45 &le; m &le; 54</span>
            </div>
            <div class="param">
                <label for="n">n</label>
                <input type="number" id="n" name="n" min="7" max="25" value="8" required>
                <span class="hint">7 &le; n &le; 25</span>
            </div>
            <div class="param">
                <label for="k">k</label>
                <input type="number" id="k" name="k" min="4" max="7" value="6" required>
                <span class="hint">4 &le; k &le; 7</span>
            </div>
            <div class="param">
                <label for="j">j</label>
                <input type="number" id="j" name="j" min="3" max="7" value="5" required>
                <span class="hint">s &le; j &le; k</span>
            </div>
            <div class="param">
                <label for="s">s</label>
                <input type="number" id="s" name="s" min="3" max="7" value="5" required>
                <span class="hint">3 &le; s &le; 7</span>
            </div>
        </div>

        <div class="demo-section">
            <h3 data-i18n="demo-title">Quick Demo Runs</h3>
            <div class="demo-buttons">
                <button type="button" class="btn btn-demo" data-i18n="demo-ex3" onclick="runDemo(45, 8, 6, 4, 4)">PDF Ex. 3 · n=8, k=6, j=4, s=4</button>
                <button type="button" class="btn btn-demo" data-i18n="demo-ex4" onclick="runDemo(45, 9, 6, 4, 4)">PDF Ex. 4 · n=9, k=6, j=4, s=4</button>
                <button type="button" class="btn btn-demo" data-i18n="demo-ex8" onclick="runDemo(45, 10, 6, 6, 4)">PDF Ex. 8 · n=10, k=6, j=6, s=4</button>
                <button type="button" class="btn btn-demo" data-i18n="demo-ex9" onclick="runDemo(45, 12, 6, 6, 4)">PDF Ex. 9 · n=12, k=6, j=6, s=4</button>
            </div>
        </div>

        <div class="mode-section">
            <h3 data-i18n="mode-title">Sample Selection Mode</h3>
            <div class="radio-group">
                <label>
                    <input type="radio" name="mode" value="random" checked onchange="toggleManual()">
                    <span data-i18n="mode-random">Random n samples</span>
                </label>
                <label>
                    <input type="radio" name="mode" value="manual" onchange="toggleManual()">
                    <span data-i18n="mode-manual">Input n samples manually</span>
                </label>
            </div>

            <div id="manualInput" class="manual-input" style="display:none;">
                <label for="manual_samples" data-i18n="manual-label">Enter n numbers, comma-separated:</label>
                <input type="text" id="manual_samples" name="manual_samples" placeholder="1, 5, 12, 23, 34, 41, 48">
            </div>
        </div>

        <div class="actions">
            <button type="submit" id="executeBtn" class="btn btn-primary" data-i18n="btn-execute">Execute</button>
            <button type="reset" class="btn btn-secondary" data-i18n="btn-clear" onclick="setTimeout(toggleManual, 0)">Clear</button>
        </div>
    </form>
</div>

<script>
const mainForm = document.getElementById('mainForm');
let isSubmitting = false;

function toggleManual() {
    const manual = document.querySelector('input[name="mode"][value="manual"]');
    document.getElementById('manualInput').style.display = manual.checked ? 'block' : 'none';
}

function setValue(id, value) {
    document.getElementById(id).value = value;
}

function runDemo(m, n, k, j, s) {
    setValue('m', m);
    setValue('n', n);
    setValue('k', k);
    setValue('j', j);
    setValue('s', s);
    document.querySelector('input[name="mode"][value="manual"]').checked = true;
    document.querySelector('input[name="mode"][value="random"]').checked = false;
    setValue('manual_samples', Array.from({ length: n }, (_, index) => index + 1).join(', '));
    toggleManual();
    mainForm.requestSubmit();
}

mainForm.addEventListener('submit', function(event) {
    if (isSubmitting) {
        event.preventDefault();
        return;
    }

    const lang = localStorage.getItem('lang') || 'en';
    document.getElementById('langField').value = lang;
    isSubmitting = true;
    mainForm.setAttribute('aria-busy', 'true');

    const executeBtn = document.getElementById('executeBtn');
    executeBtn.disabled = true;
    executeBtn.textContent = lang === 'zh' ? '计算中...' : 'Computing...';
});
</script>
{% endblock %}
