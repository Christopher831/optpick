{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 data-i18n="form-title">Please input the following parameters</h2>
    <form action="{{ url_for('execute') }}" method="post" id="mainForm">
        <input type="hidden" name="lang" id="langField" value="en">
        <div class="params-grid">
            <div class="param">
                <label for="m">m</label>
                <input type="number" id="m" name="m" min="45" max="54" value="45" required>
                <span class="hint">45 &le; m &le; 54</span>
            </div>
            <div class="param">
                <label for="n">n</label>
                <input type="number" id="n" name="n" min="7" max="25" value="8" required>
                <span class="hint">7 &le; n &le; 25</span>
            </div>
            <div class="param">
                <label for="k">k</label>
                <input type="number" id="k" name="k" min="4" max="7" value="6" required>
                <span class="hint">4 &le; k &le; 7</span>
            </div>
            <div class="param">
                <label for="j">j</label>
                <input type="number" id="j" name="j" min="3" max="7" value="5" required>
                <span class="hint">s &le; j &le; k</span>
            </div>
            <div class="param">
                <label for="s">s</label>
                <input type="number" id="s" name="s" min="3" max="7" value="5" required>
                <span class="hint">3 &le; s &le; 7</span>
            </div>
        </div>

        <div class="mode-section">
            <h3 data-i18n="mode-title">Sample Selection Mode</h3>
            <div class="radio-group">
                <label>
                    <input type="radio" name="mode" value="random" checked onchange="toggleManual()">
                    <span data-i18n="mode-random">Random n samples</span>
                </label>
                <label>
                    <input type="radio" name="mode" value="manual" onchange="toggleManual()">
                    <span data-i18n="mode-manual">Input n samples manually</span>
                </label>
            </div>

            <div id="manualInput" class="manual-input" style="display:none;">
                <label for="manual_samples" data-i18n="manual-label">Enter n numbers, comma-separated:</label>
                <input type="text" id="manual_samples" name="manual_samples" placeholder="1, 5, 12, 23, 34, 41, 48">
            </div>
        </div>

        <div class="actions">
            <button type="submit" class="btn btn-primary" data-i18n="btn-execute">Execute</button>
            <button type="reset" class="btn btn-secondary" data-i18n="btn-clear" onclick="setTimeout(toggleManual, 0)">Clear</button>
        </div>
    </form>
</div>

<script>
function toggleManual() {
    const manual = document.querySelector('input[name="mode"][value="manual"]');
    document.getElementById('manualInput').style.display = manual.checked ? 'block' : 'none';
}
document.getElementById('mainForm').addEventListener('submit', function() {
    document.getElementById('langField').value = localStorage.getItem('lang') || 'en';
});
</script>
{% endblock %}
